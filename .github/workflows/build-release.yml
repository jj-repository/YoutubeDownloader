name: Build Executables

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install system dependencies (Linux)
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt-get update
        sudo apt-get install -y libdbus-1-dev libdbus-glib-1-dev python3-dev

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        pip install yt-dlp Pillow catboxpy pyperclip

    - name: Install optional dependencies (Linux)
      if: matrix.os == 'ubuntu-latest'
      continue-on-error: true
      run: |
        pip install dbus-python

    - name: Download and bundle ffmpeg (Linux)
      if: matrix.os == 'ubuntu-latest'
      run: |
        mkdir -p ffmpeg_bundle
        cd ffmpeg_bundle
        wget https://johnvansickle.com/ffmpeg/releases/ffmpeg-release-amd64-static.tar.xz
        tar -xf ffmpeg-release-amd64-static.tar.xz
        mv ffmpeg-*-amd64-static/ffmpeg ../ffmpeg
        mv ffmpeg-*-amd64-static/ffprobe ../ffprobe
        cd ..
        chmod +x ffmpeg ffprobe
        rm -rf ffmpeg_bundle

    - name: Download and bundle yt-dlp (Linux)
      if: matrix.os == 'ubuntu-latest'
      run: |
        wget https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -O yt-dlp
        chmod +x yt-dlp

    - name: Build executable (Linux)
      if: matrix.os == 'ubuntu-latest'
      run: |
        pyinstaller --onefile --name YoutubeDownloader --windowed --add-binary "ffmpeg:." --add-binary "ffprobe:." --add-binary "yt-dlp:." --add-data "takodachi.webp:." --add-data "icon.png:." --hidden-import=PIL._tkinter_finder --collect-submodules=PIL downloader.py

    - name: Download and bundle ffmpeg (Windows)
      if: matrix.os == 'windows-latest'
      shell: pwsh
      run: |
        Invoke-WebRequest -Uri "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip" -OutFile "ffmpeg.zip"
        Expand-Archive -Path ffmpeg.zip -DestinationPath .
        Move-Item -Path ffmpeg-master-latest-win64-gpl/bin/ffmpeg.exe -Destination ffmpeg.exe
        Move-Item -Path ffmpeg-master-latest-win64-gpl/bin/ffprobe.exe -Destination ffprobe.exe
        Remove-Item -Recurse -Force ffmpeg-master-latest-win64-gpl, ffmpeg.zip

    - name: Download and bundle yt-dlp (Windows)
      if: matrix.os == 'windows-latest'
      shell: pwsh
      run: |
        Invoke-WebRequest -Uri "https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp.exe" -OutFile "yt-dlp.exe"

    - name: Build portable executable (Windows onefile)
      if: matrix.os == 'windows-latest'
      run: |
        pyinstaller --onefile --name YoutubeDownloader --windowed --icon=icon.ico --add-binary "ffmpeg.exe;." --add-binary "ffprobe.exe;." --add-binary "yt-dlp.exe;." --add-data "takodachi.webp;." --add-data "icon.png;." --hidden-import=PIL._tkinter_finder --collect-submodules=PIL downloader.py

    - name: Build installer executable (Windows onedir)
      if: matrix.os == 'windows-latest'
      run: |
        pyinstaller --onedir --name YoutubeDownloader --windowed --icon=icon.ico --add-binary "ffmpeg.exe;." --add-binary "ffprobe.exe;." --add-binary "yt-dlp.exe;." --add-data "takodachi.webp;." --add-data "icon.png;." --hidden-import=PIL._tkinter_finder --collect-submodules=PIL --distpath dist_onedir downloader.py

    - name: Create release package (Linux)
      if: matrix.os == 'ubuntu-latest'
      run: |
        mkdir -p release
        cp dist/YoutubeDownloader release/
        chmod +x release/YoutubeDownloader
        tar -czf YoutubeDownloader-Linux.tar.gz -C release .

    - name: Create portable package (Windows)
      if: matrix.os == 'windows-latest'
      shell: pwsh
      run: |
        New-Item -ItemType Directory -Force -Path portable
        Copy-Item dist\YoutubeDownloader.exe portable\YoutubeDownloader.exe
        Compress-Archive -Path portable\* -DestinationPath YTDownloaderPortable-Win.zip

    - name: Create installer (Windows)
      if: matrix.os == 'windows-latest'
      shell: pwsh
      run: |
        # Create Inno Setup script
        @"
        [Setup]
        AppName=YoutubeDownloader
        AppVersion=${{ github.ref_name }}
        AppPublisher=JJ
        DefaultDirName={autopf}\YoutubeDownloader
        DefaultGroupName=YoutubeDownloader
        OutputDir=.
        OutputBaseFilename=YTDownloaderInstaller-Win
        Compression=lzma2
        SolidCompression=yes
        SetupIconFile=icon.ico
        UninstallDisplayIcon={app}\YoutubeDownloader.exe
        ArchitecturesInstallIn64BitMode=x64compatible
        WizardStyle=modern
        DisableProgramGroupPage=yes

        [Files]
        Source: "dist_onedir\YoutubeDownloader\*"; DestDir: "{app}"; Flags: ignoreversion recursesubdirs createallsubdirs

        [Icons]
        Name: "{group}\YoutubeDownloader"; Filename: "{app}\YoutubeDownloader.exe"
        Name: "{autodesktop}\YoutubeDownloader"; Filename: "{app}\YoutubeDownloader.exe"; Tasks: desktopicon

        [Tasks]
        Name: "desktopicon"; Description: "Create a desktop shortcut"; GroupDescription: "Additional shortcuts:"

        [Run]
        Filename: "{app}\YoutubeDownloader.exe"; Description: "Launch YoutubeDownloader"; Flags: nowait postinstall skipifsilent
        "@ | Out-File -FilePath installer.iss -Encoding ASCII

        # Install Inno Setup
        choco install innosetup -y --no-progress

        # Build installer
        & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer.iss

    - name: Upload Linux artifact
      if: matrix.os == 'ubuntu-latest'
      uses: actions/upload-artifact@v4
      with:
        name: linux-build
        path: YoutubeDownloader-Linux.tar.gz

    - name: Upload Windows artifacts
      if: matrix.os == 'windows-latest'
      uses: actions/upload-artifact@v4
      with:
        name: windows-build
        path: |
          YTDownloaderPortable-Win.zip
          YTDownloaderInstaller-Win.exe

  create-release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          linux-build/YoutubeDownloader-Linux.tar.gz
          windows-build/YTDownloaderPortable-Win.zip
          windows-build/YTDownloaderInstaller-Win.exe
        body: |
          ## YoutubeDownloader ${{ github.ref_name }}

          ### Downloads
          | Platform | Type | File |
          |----------|------|------|
          | Windows | Installer (recommended) | `YTDownloaderInstaller-Win.exe` |
          | Windows | Portable (no install) | `YTDownloaderPortable-Win.zip` |
          | Linux | Portable | `YoutubeDownloader-Linux.tar.gz` |

          ### What's New
          - Dark mode (enabled by default)
          - Settings window with update controls and about info
          - Help button linking to README
          - Tab tooltips explaining each section
          - yt-dlp auto-update support on all platforms
          - Windows installer with desktop shortcut

          ### Setup
          - **Windows Installer**: Run `YTDownloaderInstaller-Win.exe` and follow the wizard
          - **Windows Portable**: Extract `YTDownloaderPortable-Win.zip` and run `YoutubeDownloader.exe`
          - **Linux**: Extract and run `./YoutubeDownloader`

          See [README](https://github.com/jj-repository/YoutubeDownloader#readme) for full documentation.
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
