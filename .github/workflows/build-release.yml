name: Build & Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 5.19) — must match APP_VERSION in constants.py'
        required: true
        type: string
      dry_run:
        description: 'Run tests only (skip build and release)'
        required: false
        type: boolean
        default: false

permissions: {}

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Validate version format
        env:
          VERSION: ${{ inputs.version }}
        run: |
          if ! echo "$VERSION" | grep -qP '^\d+\.\d+$'; then
            echo "::error::Invalid version format '$VERSION' — expected X.XX (e.g. 5.19)"
            exit 1
          fi

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-tags: true

      - name: Check version matches code
        env:
          VERSION: ${{ inputs.version }}
        run: |
          CODE_VERSION=$(grep -oP 'APP_VERSION = "\K[^"]+' constants.py)
          if [ "$CODE_VERSION" != "$VERSION" ]; then
            echo "::error::Version mismatch — constants.py has '$CODE_VERSION' but releasing '$VERSION'"
            exit 1
          fi

      - name: Check tag does not exist
        env:
          VERSION: ${{ inputs.version }}
        run: |
          if git tag -l "v$VERSION" | grep -q .; then
            echo "::error::Tag v$VERSION already exists"
            exit 1
          fi

  test:
    needs: validate
    uses: ./.github/workflows/test.yml
    permissions:
      contents: read

  build:
    needs: test
    if: ${{ !inputs.dry_run }}
    timeout-minutes: 30
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

    - name: Set up Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
      with:
        python-version: '3.11'
        cache: 'pip'
        cache-dependency-path: 'requirements.lock'

    - name: Install system dependencies (Linux)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y libdbus-1-dev libdbus-glib-1-dev python3-dev

    - name: Install dependencies
      run: pip install -r requirements.lock

    - name: Install optional dependencies (Linux)
      if: runner.os == 'Linux'
      continue-on-error: true
      run: pip install dbus-python==1.3.2

    - name: Download and bundle ffmpeg (Linux)
      if: runner.os == 'Linux'
      run: |
        wget --retry-connrefused --waitretry=5 --tries=3 https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-linux64-gpl.tar.xz
        # Verify download is a real archive (>10MB)
        FILE_SIZE=$(stat -c%s ffmpeg-master-latest-linux64-gpl.tar.xz)
        if [ "$FILE_SIZE" -lt 10000000 ]; then
          echo "::error::ffmpeg download too small ($FILE_SIZE bytes) — likely corrupted"
          exit 1
        fi
        echo "ffmpeg archive: $FILE_SIZE bytes, SHA256=$(sha256sum ffmpeg-master-latest-linux64-gpl.tar.xz | cut -d' ' -f1)"
        tar -xf ffmpeg-master-latest-linux64-gpl.tar.xz
        mv ffmpeg-master-latest-linux64-gpl/bin/ffmpeg ffmpeg
        mv ffmpeg-master-latest-linux64-gpl/bin/ffprobe ffprobe
        chmod +x ffmpeg ffprobe
        rm -rf ffmpeg-master-latest-linux64-gpl ffmpeg-master-latest-linux64-gpl.tar.xz

    - name: Download and bundle yt-dlp (Linux)
      if: runner.os == 'Linux'
      run: |
        wget --retry-connrefused --waitretry=5 --tries=3 https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -O yt-dlp
        wget --retry-connrefused --waitretry=5 --tries=3 https://github.com/yt-dlp/yt-dlp/releases/latest/download/SHA2-256SUMS -O SHA2-256SUMS
        grep ' yt-dlp$' SHA2-256SUMS | sha256sum -c -
        rm SHA2-256SUMS
        chmod +x yt-dlp
        EXPECTED_YTDLP=$(grep 'yt-dlp==' requirements.lock | cut -d= -f3)
        ACTUAL_YTDLP=$(./yt-dlp --version)
        if [ "$ACTUAL_YTDLP" != "$EXPECTED_YTDLP" ]; then
          echo "::error::yt-dlp version mismatch! Binary: $ACTUAL_YTDLP, requirements.lock: $EXPECTED_YTDLP"
          exit 1
        fi

    - name: Build executable (Linux)
      if: runner.os == 'Linux'
      run: |
        pyinstaller --onefile --name YTDownloader --windowed --add-binary "ffmpeg:." --add-binary "ffprobe:." --add-binary "yt-dlp:." --add-data "takodachi.webp:." --add-data "icon.png:." --hidden-import=PyQt6.QtCore --hidden-import=PyQt6.QtGui --hidden-import=PyQt6.QtWidgets downloader_pyqt6.py

    - name: Download and bundle ffmpeg (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        $ProgressPreference = 'SilentlyContinue'
        foreach ($i in 1..3) {
          try { Invoke-WebRequest -Uri "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip" -OutFile "ffmpeg.zip"; break }
          catch { if ($i -eq 3) { throw } Start-Sleep -Seconds ($i * 5) }
        }
        # Verify download is a real archive (>10MB)
        $size = (Get-Item ffmpeg.zip).Length
        if ($size -lt 10000000) { throw "ffmpeg download too small ($size bytes) - likely corrupted" }
        $hash = (Get-FileHash ffmpeg.zip -Algorithm SHA256).Hash
        Write-Host "ffmpeg archive: $size bytes, SHA256=$hash"
        Expand-Archive -Path ffmpeg.zip -DestinationPath .
        Move-Item -Path ffmpeg-master-latest-win64-gpl/bin/ffmpeg.exe -Destination ffmpeg.exe
        Move-Item -Path ffmpeg-master-latest-win64-gpl/bin/ffprobe.exe -Destination ffprobe.exe
        Remove-Item -Recurse -Force ffmpeg-master-latest-win64-gpl, ffmpeg.zip

    - name: Download and bundle yt-dlp (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        $ProgressPreference = 'SilentlyContinue'
        foreach ($i in 1..3) {
          try { Invoke-WebRequest -Uri "https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp.exe" -OutFile "yt-dlp.exe"; break }
          catch { if ($i -eq 3) { throw } Start-Sleep -Seconds ($i * 5) }
        }
        foreach ($i in 1..3) {
          try { Invoke-WebRequest -Uri "https://github.com/yt-dlp/yt-dlp/releases/latest/download/SHA2-256SUMS" -OutFile "SHA2-256SUMS"; break }
          catch { if ($i -eq 3) { throw } Start-Sleep -Seconds ($i * 5) }
        }
        $expected = (Get-Content SHA2-256SUMS | Select-String 'yt-dlp.exe$').ToString().Split()[0]
        $actual = (Get-FileHash yt-dlp.exe -Algorithm SHA256).Hash.ToLower()
        if ($actual -ne $expected) { throw "SHA256 mismatch for yt-dlp.exe! Expected: $expected Got: $actual" }
        Remove-Item SHA2-256SUMS
        $expectedVer = ((Get-Content requirements.lock | Select-String 'yt-dlp==').ToString() -split '==')[1]
        $actualVer = (& .\yt-dlp.exe --version)
        if ($actualVer -ne $expectedVer) { throw "yt-dlp version mismatch! Binary: $actualVer, requirements.lock: $expectedVer" }

    - name: Build executable (Windows)
      if: runner.os == 'Windows'
      run: |
        pyinstaller --onefile --name YTDownloader --windowed --icon=icon.ico --add-binary "ffmpeg.exe;." --add-binary "ffprobe.exe;." --add-binary "yt-dlp.exe;." --add-data "takodachi.webp;." --add-data "icon.png;." --hidden-import=PyQt6.QtCore --hidden-import=PyQt6.QtGui --hidden-import=PyQt6.QtWidgets downloader_pyqt6.py

    - name: Validate build output (Linux)
      if: runner.os == 'Linux'
      run: |
        test -f dist/YTDownloader || { echo "::error::Linux executable not created"; exit 1; }
        test -x dist/YTDownloader || { echo "::error::Linux executable not executable"; exit 1; }
        file dist/YTDownloader | grep -q "ELF" || { echo "::error::Invalid executable format"; exit 1; }
        echo "Linux build OK: $(du -h dist/YTDownloader | cut -f1)"

    - name: Validate build output (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        if (-not (Test-Path dist/YTDownloader.exe)) { throw "Windows executable not created" }
        $size = (Get-Item dist/YTDownloader.exe).Length
        if ($size -lt 1000000) { throw "Windows executable suspiciously small ($size bytes)" }
        Write-Host "Windows build OK: $([math]::Round($size/1MB, 1)) MB"

    - name: Create release package (Linux)
      if: runner.os == 'Linux'
      run: |
        mkdir -p release
        cp dist/YTDownloader release/
        chmod +x release/YTDownloader
        tar -czf YTDownloader-Linux.tar.gz -C release .

    - name: Upload Linux artifact
      if: runner.os == 'Linux'
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
      with:
        name: linux-build
        path: YTDownloader-Linux.tar.gz
        retention-days: 1

    - name: Upload Windows artifact
      if: runner.os == 'Windows'
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
      with:
        name: windows-build
        path: dist/YTDownloader.exe
        retention-days: 1

  create-release:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      id-token: write  # needed for cosign keyless signing

    steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

    - name: Download all artifacts
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8

    - name: Verify artifacts exist
      run: |
        test -s linux-build/YTDownloader-Linux.tar.gz || { echo "::error::Linux artifact missing or empty"; exit 1; }
        test -s windows-build/YTDownloader.exe || { echo "::error::Windows artifact missing or empty"; exit 1; }
        echo "Artifacts OK:"
        ls -lh linux-build/YTDownloader-Linux.tar.gz windows-build/YTDownloader.exe

    - name: Generate SHA256SUMS
      run: |
        # Binary artifacts (cd into each dir so sha256sum outputs bare filenames)
        (cd linux-build && sha256sum YTDownloader-Linux.tar.gz) > SHA256SUMS
        (cd windows-build && sha256sum YTDownloader.exe) >> SHA256SUMS
        # Source files (for source-mode self-update verification)
        sha256sum downloader_pyqt6.py constants.py managers/*.py >> SHA256SUMS

    - name: Sign SHA256SUMS with cosign (keyless)
      uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v3
    - name: Sign SHA256SUMS
      run: cosign sign-blob --yes SHA256SUMS --output-signature SHA256SUMS.sig --output-certificate SHA256SUMS.pem

    - name: Create Release
      run: |
        BODY="$(cat <<NOTES
        ## YTDownloader v${VERSION}

        ### Downloads
        | Platform | File |
        |----------|------|
        | Windows | \`YTDownloader.exe\` |
        | Linux | \`YTDownloader-Linux.tar.gz\` |

        ### Setup
        - **Windows**: Download \`YTDownloader.exe\` and run it directly
        - **Linux**: Extract and run \`./YTDownloader\`

        See [README](https://github.com/jj-repository/YoutubeDownloader#readme) for full documentation.
        NOTES
        )"
        gh release create "v${VERSION}" \
          linux-build/YTDownloader-Linux.tar.gz \
          windows-build/YTDownloader.exe \
          SHA256SUMS \
          SHA256SUMS.sig \
          SHA256SUMS.pem \
          --title "v${VERSION}" \
          --notes "$BODY"
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        VERSION: ${{ inputs.version }}
