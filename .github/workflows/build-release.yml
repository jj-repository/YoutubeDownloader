name: Build Executables

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'
        cache: 'pip'
        cache-dependency-path: 'requirements.txt'

    - name: Install system dependencies (Linux)
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt-get update
        sudo apt-get install -y libdbus-1-dev libdbus-glib-1-dev python3-dev

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        pip install -r requirements.txt

    - name: Install optional dependencies (Linux)
      if: matrix.os == 'ubuntu-latest'
      continue-on-error: true
      run: |
        pip install dbus-python

    - name: Download and bundle ffmpeg (Linux)
      if: matrix.os == 'ubuntu-latest'
      run: |
        wget https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-linux64-gpl.tar.xz
        tar -xf ffmpeg-master-latest-linux64-gpl.tar.xz
        mv ffmpeg-master-latest-linux64-gpl/bin/ffmpeg ffmpeg
        mv ffmpeg-master-latest-linux64-gpl/bin/ffprobe ffprobe
        chmod +x ffmpeg ffprobe
        rm -rf ffmpeg-master-latest-linux64-gpl ffmpeg-master-latest-linux64-gpl.tar.xz

    - name: Download and bundle yt-dlp (Linux)
      if: matrix.os == 'ubuntu-latest'
      run: |
        wget https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -O yt-dlp
        wget https://github.com/yt-dlp/yt-dlp/releases/latest/download/SHA2-256SUMS -O SHA2-256SUMS
        grep ' yt-dlp$' SHA2-256SUMS | sha256sum -c -
        rm SHA2-256SUMS
        chmod +x yt-dlp

    - name: Build executable (Linux)
      if: matrix.os == 'ubuntu-latest'
      run: |
        pyinstaller --onefile --name YTDownloader --windowed --add-binary "ffmpeg:." --add-binary "ffprobe:." --add-binary "yt-dlp:." --add-data "takodachi.webp:." --add-data "icon.png:." --hidden-import=PyQt6.QtCore --hidden-import=PyQt6.QtGui --hidden-import=PyQt6.QtWidgets --collect-submodules=PIL downloader_pyqt6.py

    - name: Download and bundle ffmpeg (Windows)
      if: matrix.os == 'windows-latest'
      shell: pwsh
      run: |
        Invoke-WebRequest -Uri "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip" -OutFile "ffmpeg.zip"
        Expand-Archive -Path ffmpeg.zip -DestinationPath .
        Move-Item -Path ffmpeg-master-latest-win64-gpl/bin/ffmpeg.exe -Destination ffmpeg.exe
        Move-Item -Path ffmpeg-master-latest-win64-gpl/bin/ffprobe.exe -Destination ffprobe.exe
        Remove-Item -Recurse -Force ffmpeg-master-latest-win64-gpl, ffmpeg.zip

    - name: Download and bundle yt-dlp (Windows)
      if: matrix.os == 'windows-latest'
      shell: pwsh
      run: |
        Invoke-WebRequest -Uri "https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp.exe" -OutFile "yt-dlp.exe"
        Invoke-WebRequest -Uri "https://github.com/yt-dlp/yt-dlp/releases/latest/download/SHA2-256SUMS" -OutFile "SHA2-256SUMS"
        $expected = (Get-Content SHA2-256SUMS | Select-String 'yt-dlp.exe$').ToString().Split()[0]
        $actual = (Get-FileHash yt-dlp.exe -Algorithm SHA256).Hash.ToLower()
        if ($actual -ne $expected) { throw "SHA256 mismatch for yt-dlp.exe! Expected: $expected Got: $actual" }
        Remove-Item SHA2-256SUMS

    - name: Build executable (Windows)
      if: matrix.os == 'windows-latest'
      run: |
        pyinstaller --onefile --name YTDownloader --windowed --icon=icon.ico --add-binary "ffmpeg.exe;." --add-binary "ffprobe.exe;." --add-binary "yt-dlp.exe;." --add-data "takodachi.webp;." --add-data "icon.png;." --hidden-import=PyQt6.QtCore --hidden-import=PyQt6.QtGui --hidden-import=PyQt6.QtWidgets --collect-submodules=PIL downloader_pyqt6.py

    - name: Create release package (Linux)
      if: matrix.os == 'ubuntu-latest'
      run: |
        mkdir -p release
        cp dist/YTDownloader release/
        chmod +x release/YTDownloader
        tar -czf YTDownloader-Linux.tar.gz -C release .

    - name: Upload Linux artifact
      if: matrix.os == 'ubuntu-latest'
      uses: actions/upload-artifact@v7
      with:
        name: linux-build
        path: YTDownloader-Linux.tar.gz
        retention-days: 1

    - name: Upload Windows artifact
      if: matrix.os == 'windows-latest'
      uses: actions/upload-artifact@v7
      with:
        name: windows-build
        path: dist/YTDownloader.exe
        retention-days: 1

  create-release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v8

    - name: Generate SHA256SUMS
      run: |
        sha256sum linux-build/YTDownloader-Linux.tar.gz windows-build/YTDownloader.exe | sed 's|.*/||' > SHA256SUMS

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          linux-build/YTDownloader-Linux.tar.gz
          windows-build/YTDownloader.exe
          SHA256SUMS
        body: |
          ## YTDownloader ${{ github.ref_name }}

          ### Downloads
          | Platform | File |
          |----------|------|
          | Windows | `YTDownloader.exe` |
          | Linux | `YTDownloader-Linux.tar.gz` |

          ### Setup
          - **Windows**: Download `YTDownloader.exe` and run it directly
          - **Linux**: Extract and run `./YTDownloader`

          See [README](https://github.com/jj-repository/YoutubeDownloader#readme) for full documentation.
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
