name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:
  workflow_dispatch:

permissions: {}

concurrency:
  group: test-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'requirements.lock'

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libegl1

      - name: Install dependencies
        run: |
          pip install -r requirements.lock
          pip install -r requirements-ci.lock

      - name: Install optional dependencies (Linux)
        if: runner.os == 'Linux'
        continue-on-error: true
        run: pip install dbus-python==1.3.2

      - name: Run tests
        env:
          QT_QPA_PLATFORM: offscreen
        run: pytest -v --cov=constants --cov=managers --cov=downloader_pyqt6 --cov-report=term-missing --cov-fail-under=55

  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'requirements.lock'

      - name: Install ruff
        run: pip install -r requirements-ci.lock

      - name: Run ruff check
        run: ruff check .

      - name: Run ruff format check
        run: ruff format --check .

  all-checks:
    if: always()
    needs: [test, lint]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: All checks passed
        run: |
          if [ "${{ needs.test.result }}" != "success" ] || [ "${{ needs.lint.result }}" != "success" ]; then
            echo "::error::Some checks failed"
            exit 1
          fi
