name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: Describe the issue...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Open the app
        2. Paste URL '...'
        3. Click Download
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: dropdown
    id: version
    attributes:
      label: How are you running the app?
      options:
        - Windows portable (.exe)
        - Windows installer
        - Linux binary
        - From source (python downloader.py)
    validations:
      required: true

  - type: input
    id: app-version
    attributes:
      label: App version
      description: Shown in Settings or the title bar.
      placeholder: e.g. 4.1.0
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Windows 11
        - Windows 10
        - Linux
        - Other
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Log output (if available)
      description: Paste relevant lines from `~/.youtubedownloader/youtubedownloader.log`
      render: text
    validations:
      required: false
